          <p>함수여서 함수형으로 선언하지만 동작은<br>함수 데이터 자리에 리턴 값을 넣어주는..</p>
<p>함수를 데이터를 반환하는 속성 처럼 사용하게 한다<br>값을 얻는 용도로만 쓰인다</p>
<p>값을 넣을 수 없다</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">User</span> &#123;</span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">first, last</span>) &#123;</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">firstName</span> = first</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">lastName</span> = last</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">// Getter</span></span><br><span class="line">  <span class="comment">// 읽기 전용으로 수정할 수 없다</span></span><br><span class="line">  <span class="keyword">get</span> <span class="title function_">fullName</span>() &#123;</span><br><span class="line">    <span class="keyword">return</span> <span class="string">`<span class="subst">$&#123;<span class="variable language_">this</span>.firstName&#125;</span> <span class="subst">$&#123;<span class="variable language_">this</span>.lastName&#125;</span>`</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">// Setter</span></span><br><span class="line">  <span class="comment">// 수정할 수 있다, </span></span><br><span class="line">  <span class="keyword">set</span> <span class="title function_">fullName</span>(<span class="params">value</span>) &#123;</span><br><span class="line">    ;[<span class="variable language_">this</span>.<span class="property">firstName</span>, <span class="variable language_">this</span>.<span class="property">lastName</span>] = value.<span class="title function_">split</span>(<span class="string">&#x27; &#x27;</span>)</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> heropy = <span class="keyword">new</span> <span class="title class_">User</span>(<span class="string">&#x27;Heropy&#x27;</span>, <span class="string">&#x27;Park&#x27;</span>)</span><br><span class="line"><span class="keyword">const</span> neo = <span class="keyword">new</span> <span class="title class_">User</span>(<span class="string">&#x27;Neo&#x27;</span>, <span class="string">&#x27;Anderson&#x27;</span>)</span><br><span class="line"></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(heropy.<span class="property">fullName</span>) <span class="comment">// &#x27;Heropy Park&#x27;</span></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(neo.<span class="property">fullName</span>) <span class="comment">// &#x27;Neo Anderson&#x27;</span></span><br><span class="line"></span><br><span class="line">heropy.<span class="property">fullName</span> = <span class="string">&#x27;Lewis Yang&#x27;</span></span><br><span class="line">neo.<span class="property">fullName</span> = <span class="string">&#x27;Smith John&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(heropy.<span class="property">firstName</span>, heropy.<span class="property">lastName</span>) <span class="comment">// &#x27;Lewis&#x27;, &#x27;Yang&#x27;</span></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(heropy.<span class="property">fullName</span>) <span class="comment">// &#x27;Lewis Yang&#x27;</span></span><br><span class="line"></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(neo.<span class="property">firstName</span>, neo.<span class="property">lastName</span>) <span class="comment">// &#x27;Smith&#x27;, &#x27;John&#x27;</span></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(neo.<span class="property">fullName</span>) <span class="comment">// &#x27;Smith John&#x27;</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>

<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"> <span class="keyword">set</span> <span class="title function_">fullName</span>(<span class="params">value</span>) &#123;</span><br><span class="line"> <span class="keyword">const</span> firstName = <span class="string">&#x27;test&#x27;</span>;</span><br><span class="line"> <span class="keyword">const</span> lastName = <span class="string">&#x27;fream&#x27;</span>;</span><br><span class="line"> </span><br><span class="line"> [<span class="variable language_">this</span>.<span class="property">firstName</span>, <span class="variable language_">this</span>.<span class="property">lastName</span>] == value.<span class="title function_">split</span>(<span class="string">&#x27; &#x27;</span>)</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
